# event-to-news configuration
# ─────────────────────────────────────────────────────────────────────────────
# server:    HTTP server settings
# log_level: application log verbosity (DEBUG, INFO, WARNING, ERROR, CRITICAL)
#            defaults to WARNING if omitted
# feeds:     one entry per RSS feed, keyed by its URL slug
# ─────────────────────────────────────────────────────────────────────────────

log_level: "WARNING"

server:
  host: "0.0.0.0"
  port: 8000
  # Base URL visible from your FreshRSS instance (change to your server's IP/hostname)
  base_url: "http://localhost:8000"

feeds:
  # ── Pronote feed for your first daughter ────────────────────────────────────
  # Feed available at: http://localhost:8000/feed/alice-pronote
  #
  # Before first run, place credentials.json in data/alice-pronote/credentials.json
  # Generate it once with: uv run python -m pronotepy.create_login
  alice-pronote:
    title: "Alice — School (Pronote)"
    description: "Grades, homework, absences and punishments for Alice"
    module: pronote
    schedule: "30m"
    max_items: 200
    params:
      student_name: "Alice"
      fetch_grades: true
      fetch_homework: true
      fetch_punishments: true
      fetch_absences: true

  # ── Cafetaria feed ──────────────────────────────────────────────────────────
  # Feed available at: http://localhost:8000/feed/alice-cafetaria
  #
  # alice-cafetaria:
  #   title: "Alice — Cafeteria Credit"
  #   description: "Daily cafeteria credit balance for Alice"
  #   module: cafetaria
  #   schedule: "0 20 * * *"
  #   max_items: 60
  #   params:
  #     username: "your_username"
  #     password: "your_password"
  #     student_name: "Alice"      # optional
  #     site: "aes00152"           # optional, default is aes00152

  # ── Pronote feed for your second daughter ───────────────────────────────────
  # Place credentials in data/bob-pronote/credentials.json before first run.
  # bob-pronote:
  #   title: "Bob — School (Pronote)"
  #   description: "Grades, homework, absences and punishments for Bob"
  #   module: pronote
  #   schedule: "30m"
  #   max_items: 200
  #   params:
  #     student_name: "Bob"
  #     fetch_grades: true
  #     fetch_homework: true
  #     fetch_punishments: true
  #     fetch_absences: true
